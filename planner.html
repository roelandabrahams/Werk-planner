<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienst & Verlof Planner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeecea;
    --text: #1a1a18;
    --text-secondary: #6b6b68;
    --text-tertiary: #a0a09d;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: system-ui, -apple-system, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #262624;
      --bg-tertiary: #303030;
      --text: #f0ede8;
      --text-secondary: #a0a09d;
      --text-tertiary: #6b6b68;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.28);
    }
    .b-dienst { background: #27500a !important; color: #c0dd97 !important; }
    .b-vakantie { background: #0c447c !important; color: #b5d4f4 !important; }
    .b-compensatie { background: #633806 !important; color: #fac775 !important; }
    .b-ziek { background: #791f1f !important; color: #f7c1c1 !important; }
    .stat-dienst { color: #97c459 !important; }
    .stat-vakantie { color: #85b7eb !important; }
    .stat-compensatie { color: #ef9f27 !important; }
    .stat-ziek { color: #f09595 !important; }
  }

  body {
    font-family: var(--font);
    background: var(--bg-secondary);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 780px; margin: 0 auto; }

  h1 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 1.5rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  h1 svg { flex-shrink: 0; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
  }

  .add-row {
    display: grid;
    grid-template-columns: 160px 1fr 1fr auto;
    gap: 8px;
    align-items: end;
  }

  @media (max-width: 600px) {
    .add-row { grid-template-columns: 1fr 1fr; }
    .add-row .note-field { grid-column: 1 / -1; }
    .add-row .btn-field { grid-column: 1 / -1; }
  }

  .field label {
    display: block;
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  input[type="date"],
  input[type="text"],
  select {
    width: 100%;
    height: 36px;
    padding: 0 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
  }

  input:hover, select:hover { border-color: var(--border-hover); }
  input:focus, select:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  input.error { border-color: #e24b4a; box-shadow: 0 0 0 3px rgba(226,75,74,0.15); }

  button {
    height: 36px;
    padding: 0 16px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.12s;
    white-space: nowrap;
  }

  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }

  .btn-add {
    width: 100%;
    justify-content: center;
    font-weight: 500;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1rem;
  }

  @media (max-width: 500px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  .stat {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 10px 12px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  .stat-num { font-size: 24px; font-weight: 500; }
  .stat-dienst { color: #3b6d11; }
  .stat-vakantie { color: #185fa5; }
  .stat-compensatie { color: #854f0b; }
  .stat-ziek { color: #a32d2d; }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .pill {
    padding: 4px 13px;
    font-size: 12px;
    border: 0.5px solid var(--border);
    border-radius: 20px;
    background: none;
    cursor: pointer;
    color: var(--text-secondary);
    height: auto;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }

  .pill.active {
    background: var(--bg-tertiary);
    color: var(--text);
    border-color: var(--border-hover);
  }

  .sort-group {
    margin-left: auto;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .sort-lbl { font-size: 11px; color: var(--text-secondary); }

  .list-header {
    display: grid;
    grid-template-columns: 120px 1fr 32px;
    gap: 8px;
    padding: 0 12px 6px;
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .entry-wrap {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    margin-bottom: 5px;
    background: var(--bg);
    overflow: hidden;
    transition: border-color 0.12s;
  }

  .entry-wrap:hover { border-color: var(--border-hover); }

  .entry {
    display: grid;
    grid-template-columns: 120px 1fr 32px;
    gap: 8px;
    align-items: center;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
  }

  .entry-date { font-size: 13px; font-weight: 500; }
  .entry-dow { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

  .entry-middle { display: flex; align-items: center; gap: 8px; min-width: 0; }

  .chevron { flex-shrink: 0; color: var(--text-tertiary); transition: transform 0.2s; line-height: 0; }
  .entry-wrap.open .chevron { transform: rotate(180deg); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .b-dienst { background: #eaf3de; color: #3b6d11; }
  .b-vakantie { background: #e6f1fb; color: #185fa5; }
  .b-compensatie { background: #faeeda; color: #854f0b; }
  .b-ziek { background: #fcebeb; color: #a32d2d; }

  .entry-note-preview {
    font-size: 12px;
    color: var(--text-tertiary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .entry-note-expand {
    display: none;
    padding: 8px 12px 12px;
    border-top: 0.5px solid var(--border);
  }

  .entry-wrap.open .entry-note-expand { display: block; }

  .entry-note-expand p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .note-empty { color: var(--text-tertiary) !important; font-style: italic; }

  .del-btn {
    height: 28px;
    width: 28px;
    padding: 0;
    border: none;
    background: none;
    color: var(--text-tertiary);
    cursor: pointer;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s, background 0.1s;
    flex-shrink: 0;
  }

  .del-btn:hover { color: #e24b4a; background: #fcebeb; }

  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .empty svg { display: block; margin: 0 auto 10px; opacity: 0.4; }
</style>
</head>
<body>
<div class="container">
  <h1>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Dienst &amp; Verlof Planner
  </h1>

  <div class="card">
    <div class="add-row">
      <div class="field">
        <label>Datum</label>
        <input type="date" id="inp-date">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="inp-type">
          <option value="dienst">Dienst</option>
          <option value="vakantie">Vakantie</option>
          <option value="compensatie">Compensatiedag</option>
          <option value="ziek">Ziek</option>
        </select>
      </div>
      <div class="field note-field">
        <label>Notitie (optioneel)</label>
        <input type="text" id="inp-note" placeholder="bijv. nachtdienst, ochtend…">
      </div>
      <div class="field btn-field">
        <label style="visibility:hidden">add</label>
        <button class="btn-add" onclick="addEntry()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Toevoegen
        </button>
      </div>
    </div>
  </div>

  <div class="stats-row" id="stats"></div>

  <div class="controls">
    <button class="pill active" data-filter="alle" onclick="setFilter('alle',this)">Alle</button>
    <button class="pill" data-filter="dienst" onclick="setFilter('dienst',this)">Dienst</button>
    <button class="pill" data-filter="vakantie" onclick="setFilter('vakantie',this)">Vakantie</button>
    <button class="pill" data-filter="compensatie" onclick="setFilter('compensatie',this)">Compensatie</button>
    <button class="pill" data-filter="ziek" onclick="setFilter('ziek',this)">Ziek</button>
    <div class="sort-group">
      <span class="sort-lbl">Sorteren:</span>
      <button class="pill active" id="sort-asc" onclick="setSort('asc')">Oudste eerst</button>
      <button class="pill" id="sort-desc" onclick="setSort('desc')">Nieuwste eerst</button>
    </div>
  </div>

  <div class="list-header">
    <span>Datum</span><span>Type</span><span></span>
  </div>
  <div id="list"></div>
</div>

<script>
  const STORAGE_KEY = 'dienst-planner-v1';
  const DOW = ['zo','ma','di','wo','do','vr','za'];
  const LABELS = { dienst:'Dienst', vakantie:'Vakantie', compensatie:'Compensatiedag', ziek:'Ziek' };

  let entries = [];
  let filter = 'alle';
  let sort = 'asc';

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) entries = JSON.parse(raw);
    } catch(e) { entries = []; }
    const today = new Date();
    document.getElementById('inp-date').value = today.toISOString().slice(0,10);
    render();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  function addEntry() {
    const date = document.getElementById('inp-date').value;
    const type = document.getElementById('inp-type').value;
    const note = document.getElementById('inp-note').value.trim();
    const dateInput = document.getElementById('inp-date');

    if (!date) { dateInput.classList.add('error'); setTimeout(() => dateInput.classList.remove('error'), 1200); return; }

    if (entries.find(e => e.date === date && e.type === type)) {
      dateInput.classList.add('error');
      setTimeout(() => dateInput.classList.remove('error'), 1200);
      return;
    }

    entries.push({ id: Date.now(), date, type, note });
    document.getElementById('inp-note').value = '';

    const next = new Date(date + 'T12:00:00');
    next.setDate(next.getDate() + 1);
    dateInput.value = next.toISOString().slice(0,10);

    save();
    render();
  }

  function delEntry(id) {
    entries = entries.filter(e => e.id !== id);
    save();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.controls .pill[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function setSort(s) {
    sort = s;
    document.getElementById('sort-asc').classList.toggle('active', s === 'asc');
    document.getElementById('sort-desc').classList.toggle('active', s === 'desc');
    render();
  }

  function render() {
    const counts = { dienst:0, vakantie:0, compensatie:0, ziek:0 };
    entries.forEach(e => { if (counts[e.type] !== undefined) counts[e.type]++; });

    document.getElementById('stats').innerHTML = Object.entries(counts).map(([t, n]) =>
      `<div class="stat">
        <div class="stat-label">${LABELS[t]}</div>
        <div class="stat-num stat-${t}">${n}</div>
      </div>`
    ).join('');

    let shown = filter === 'alle' ? [...entries] : entries.filter(e => e.type === filter);
    shown.sort((a, b) => sort === 'asc' ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date));

    const list = document.getElementById('list');
    if (!shown.length) {
      list.innerHTML = `<div class="empty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Nog geen dagen toegevoegd
      </div>`;
      return;
    }

    list.innerHTML = shown.map(e => {
      const d = new Date(e.date + 'T12:00:00');
      const fmt = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
      const day = DOW[d.getDay()];
      const preview = e.note ? e.note : '';
      const noteHtml = e.note
        ? `<p>${e.note.replace(/</g,'&lt;')}</p>`
        : `<p class="note-empty">Geen notitie</p>`;
      return `<div class="entry-wrap" id="wrap-${e.id}">
        <div class="entry" onclick="toggleEntry(${e.id})">
          <div><div class="entry-date">${fmt}</div><div class="entry-dow">${day}</div></div>
          <div class="entry-middle">
            <span class="badge b-${e.type}">${LABELS[e.type]}</span>
            ${preview ? `<span class="entry-note-preview">${preview.replace(/</g,'&lt;')}</span>` : ''}
            <span class="chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
          </div>
          <button class="del-btn" onclick="event.stopPropagation();delEntry(${e.id})" title="Verwijderen" aria-label="Verwijder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          </button>
        </div>
        <div class="entry-note-expand">${noteHtml}</div>
      </div>`;
    }).join('');
  }

  function toggleEntry(id) {
    const wrap = document.getElementById('wrap-' + id);
    if (wrap) wrap.classList.toggle('open');
  }

  document.getElementById('inp-note').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });
  document.getElementById('inp-date').addEventListener('keydown', e => { if (e.key === 'Enter') addEntry(); });

  load();
</script>
</body>
</html>
